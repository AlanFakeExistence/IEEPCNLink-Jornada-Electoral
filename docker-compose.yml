version: "3.9"

services:
  dashboard:
    image: ieepcnlink-dashboard:latest
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - USE_MOCK_DATA=${USE_MOCK_DATA:-false}
    networks:
      - ieepcnlink_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

networks:
  ieepcnlink_net:
    driver: overlay
